name: Deploy Snippets

on:
  push:
    branches: ["main"]
    paths:
      - "packages/**" # Only trigger if packages change

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Needed for HEAD^1 comparison

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect Changed Packages
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          # Use Turbo to list what it WOULD build
          # We check against HEAD^1 (the previous commit)
          CHANGED=$(bunx turbo run build --filter="...[HEAD^1]" --dry=json | jq -r '.tasks | map(.package) | unique | join(",")')

          echo "Changed packages: $CHANGED"
          echo "packages=$CHANGED" >> $GITHUB_OUTPUT

      - name: Build Changed Packages Only
        if: steps.filter.outputs.packages != ''
        run: bunx turbo run build --filter="...[HEAD^1]"

      - name: Deploy to R2
        if: steps.filter.outputs.packages != ''
        env:
          CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: bun scripts/deploy.js "${{ steps.filter.outputs.packages }}"
