name: Deploy Snippets

on:
  push:
    branches: ["main"]
    paths:
      - "packages/**" # Only trigger if packages change

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Needed for HEAD^1 comparison

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Detect Changed Packages
        id: filter
        run: |
          # Use Turbo to list what it WOULD build
          # We check against HEAD^1 (the previous commit)
          CHANGED=$(npx turbo run build --filter="...[HEAD^1]" --dry=json | jq -r '.tasks | map(.package) | unique | join(",")')
          
          echo "Changed packages: $CHANGED"
          echo "packages=$CHANGED" >> $GITHUB_OUTPUT

      - name: Build Changed Packages Only
        if: steps.filter.outputs.packages != ''
        run: pnpm turbo run build --filter="...[HEAD^1]"

      - name: Deploy to R2
        if: steps.filter.outputs.packages != ''
        env:
          CLOUDFLARE_BUCKET_NAME: ${{ secrets.CLOUDFLARE_BUCKET_NAME }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
          CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
        run: |
          node scripts/deploy.js "${{ steps.filter.outputs.packages }}"
