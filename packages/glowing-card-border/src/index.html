<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snippet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div id="cards">
      <div class="card">
        <div class="card-content">
          <div class="card-image">
            <i data-lucide="zap"></i>
          </div>
          <div class="card-info-wrapper">
            <div class="card-info">
              <i data-lucide="zap"></i>
              <div class="card-info-title">
                <h3>Energy</h3>  
                <h4>Look, a Zap</h4>
              </div>    
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-content">
          <div class="card-image">
            <i data-lucide="mountain"></i>
          </div>
          <div class="card-info-wrapper">
            <div class="card-info">
              <i data-lucide="mountain"></i>
              <div class="card-info-title">
                <h3>Adventure</h3>  
                <h4>Look, a Mountain</h4>
              </div>    
            </div>  
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-content">
          <div class="card-image">
            <i data-lucide="rocket"></i>
          </div>
          <div class="card-info-wrapper">
            <div class="card-info">
              <i data-lucide="rocket"></i>
              <div class="card-info-title">
                <h3>Liftoff</h3>  
                <h4>Look, a Rocket</h4>
              </div>    
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-content">
          <div class="card-image">
            <i data-lucide="heart"></i>
          </div>
          <div class="card-info-wrapper">
            <div class="card-info">
              <i data-lucide="heart"></i>
              <div class="card-info-title">
                <h3>Love</h3>  
                <h4>Look, a Heart</h4>
              </div>    
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-content">
          <div class="card-image">
            <i data-lucide="star"></i>
          </div>
          <div class="card-info-wrapper">
            <div class="card-info">
              <i data-lucide="star"></i>
              <div class="card-info-title">
                <h3>Fame</h3>  
                <h4>Look, a Star</h4>
              </div>    
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-content">
          <div class="card-image">
            <i data-lucide="palette"></i>
          </div>
          <div class="card-info-wrapper">
            <div class="card-info">
              <i data-lucide="palette"></i>
              <div class="card-info-title">
                <h3>Create</h3>  
                <h4>Look, a Palette</h4>
              </div>    
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./script.js"></script>
  </body>
</html>
